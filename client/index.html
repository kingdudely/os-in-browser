<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">
<video id="video" autoplay playsinline style="width:100vw;height:100vh;object-fit:contain;"></video>

<script>
const video = document.getElementById('video')

const pc = new RTCPeerConnection({
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun.cloudflare.com:3478' }
  ]
})

let channel
let wsClosed = false

pc.ontrack = (e) => {
  video.srcObject = e.streams[0]
}

pc.ondatachannel = (e) => {
  channel = e.channel
}

const ws = new WebSocket('ws://localhost:8080')

ws.onopen = () => {
  ws.send(JSON.stringify({ type: 'viewer' }))
}

ws.onmessage = async (ev) => {
  const msg = JSON.parse(ev.data)

  if (msg.type === 'offer') {
    await pc.setRemoteDescription(msg)

    const answer = await pc.createAnswer()
    await pc.setLocalDescription(answer)

    ws.send(JSON.stringify({ type: 'answer', ...answer }))
  }
}

// CLOSE WS after WebRTC is ready
pc.onconnectionstatechange = () => {
  if (pc.connectionState === 'connected' && !wsClosed) {
    wsClosed = true
    console.log('viewer connected → closing WS')
    ws.close()
  }
}

// send input
video.addEventListener('click', (e) => {
  channel?.send(JSON.stringify({
    type: 'mouse',
    x: e.clientX,
    y: e.clientY,
    click: true
  }))
})

window.addEventListener('keydown', (e) => {
  channel?.send(JSON.stringify({
    type: 'key',
    key: e.key
  }))
})
</script>
</body>
</html>
