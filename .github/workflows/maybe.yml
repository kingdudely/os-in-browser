name: Remote Stream Direct IP (Pure Node.js - ESM)

on:
  workflow_dispatch:
    inputs:
      os:
        description: 'Choose Operating System'
        required: true
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest
          - windows-latest
          - macos-latest

env:
  TIMEOUT_MINUTES: 360

jobs:
  stream:
    runs-on: ${{ github.event.inputs.os }}
    timeout-minutes: 60 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies (Linux Only)
        if: ${{ github.event.inputs.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libasound2 devhelp-common
          Xvfb :99 -screen 0 1280x1024x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Initialize NPM and Install Packages
        run: |
          npm init -y
          # Configure package.json to treat all native .js files as ESM modules
          npm pkg set type="module"
          npm install quico screenshot-desktop node-forge
        shell: bash

      - name: Create Node.js WebTransport Server (ESM)
        run: |
          cat << 'EOF' > server.js
          // Native ESM imports
          import quico from 'quico';
          import screenshot from 'screenshot-desktop';
          import forge from 'node-forge';
          import fs from 'fs';
          import crypto from 'crypto';
          
          // ==========================================
          // NATIVE 6-HOUR CERTIFICATE GENERATION
          // ==========================================
          console.log("Generating 6-hour self-signed certificate...");
          const pkeys = forge.pki.rsa.generateKeyPair(2048);
          const cert = forge.pki.createCertificate();
          
          cert.publicKey = pkeys.publicKey;
          cert.serialNumber = '01' + crypto.randomBytes(19).toString('hex');
          
          cert.validity.notBefore = new Date();
          cert.validity.notAfter = new Date();
          cert.validity.notAfter.setHours(cert.validity.notBefore.getHours() + 6);
          
          const attrs = [{ name: 'commonName', value: 'localhost' }];
          cert.setSubject(attrs);
          cert.setIssuer(attrs);
          
          cert.sign(pkeys.privateKey, forge.md.sha256.create());
          
          const pemKey = forge.pki.privateKeyToPem(pkeys.privateKey);
          const pemCert = forge.pki.certificateToPem(cert);
          
          const der = forge.asn1.toDer(forge.pki.certificateToAsn1(cert)).getBytes();
          const shasum = crypto.createHash('sha256');
          shasum.update(Buffer.from(der, 'binary'));
          const fingerprintB64 = shasum.digest('base64');
          
          console.log("==================================================");
          console.log(`WEBTRANSPORT CERT HASH: ${fingerprintB64}`);
          console.log("==================================================");
          
          let html = fs.readFileSync('index.html', 'utf8');
          html = html.replace('__CERT_HASH_PLACEHOLDER__', fingerprintB64);
          fs.writeFileSync('index.html', html);
          
          // ==========================================
          // WEBTRANSPORT QUICO SERVER
          // ==========================================
          const server = quico.createServer({ key: pemKey, cert: pemCert }, (req, res) => {
              if (req.headers[':protocol'] === 'webtransport') {
                  res.writeHead(200);
                  req.on('stream', (stream) => {
                      const frameInterval = setInterval(async () => {
                          try {
                              const imgBuffer = await screenshot({ format: 'jpeg' });
                              if (stream.writable && !stream.destroyed) {
                                  stream.write(imgBuffer);
                              }
                          } catch (err) {
                              console.error('Capture error:', err.message);
                          }
                      }, 100);
          
                      stream.on('close', () => {
                          clearInterval(frameInterval);
                      });
                  });
              } else {
                  res.writeHead(200, { 'Content-Type': 'text/html' });
                  res.end(html);
              }
          });
          
          // Look up the public IP dynamically using native fetch before listening
          let publicIp = 'localhost';
          try {
              const response = await fetch('https://api.ipify.org');
              if (response.ok) {
                  publicIp = await response.text();
              }
          } catch (err) {
              console.error('Failed to automatically fetch public IP:', err.message);
          }
          
          server.listen(4433, '0.0.0.0', () => {
              console.log(`Server streaming at: https://${publicIp}:4433`);
          });
          EOF
        shell: bash

      - name: Create Frontend Client Blueprint
        run: |
          cat << 'EOF' > index.html
          <!DOCTYPE html>
          <html>
          <head>
              <title>WebTransport Stream (Pure JS)</title>
              <style>
                  body { margin: 0; overflow: hidden; background: #000; text-align: center; }
                  img { max-width: 100%; max-height: 100vh; display: block; margin: 0 auto; }
              </style>
          </head>
          <body>
              <img id="screen" src="" />
              <script>
                  const img = document.getElementById("screen");
                  
                  async function startTransport() {
                      const url = `https://${window.location.hostname}:4433`;
                      
                      const transport = new WebTransport(url, {
                          serverCertificateHashes: [
                              {
                                  algorithm: "sha-256",
                                  value: Uint8Array.from(atob("__CERT_HASH_PLACEHOLDER__"), c => c.charCodeAt(0))
                              }
                          ]
                      });

                      await transport.ready;
                      const stream = await transport.createBidirectionalStream();
                      const reader = stream.readable.getReader();

                      while (true) {
                          const { value, done } = await reader.read();
                          if (done) break;
                          
                          const blob = new Blob([value], { type: 'image/jpeg' });
                          if (img.src) URL.revokeObjectURL(img.src);
                          img.src = URL.createObjectURL(blob);
                      }
                  }

                  startTransport().catch(console.error);
              </script>
          </body>
          </html>
          EOF
        shell: bash

      - name: Run Server
        run: |
          export PUBLIC_IP=$(curl -s https://ipify.org)
          node server.js
        shell: bash
