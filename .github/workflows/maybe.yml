name: Remote Stream Direct IP (Pure Node.js)

on:
  workflow_dispatch:
    inputs:
      os:
        description: 'Choose Operating System'
        required: true
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest
          - windows-latest
          - macos-latest

env:
  TIMEOUT_MINUTES: 360

jobs:
  stream:
    runs-on: ${{ github.event.inputs.os }}
    timeout-minutes: 60 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies (Linux Only)
        if: ${{ github.event.inputs.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          # xvfb for virtual display, plus native tools needed for screenshot utilities
          sudo apt-get install -y xvfb libasound2 devhelp-common
          Xvfb :99 -screen 0 1280x1024x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Initialize NPM and Install Packages
        run: |
          npm init -y
          # Installing quico for WebTransport and screenshot-desktop to kill off Python
          npm install quico screenshot-desktop
        shell: bash

      - name: Generate Self-Signed Certificate Tokens
        id: certs
        run: |
          openssl req -newkey rsa:2048 -nodes -keyout key.pem -x509 -days 0.25 -out cert.pem -subj "/CN=localhost"
          FINGERPRINT=$(openssl x509 -in cert.pem -pubkey -noout | openssl pkey -pubin -outform DER | openssl dgst -sha256 -binary | base64)
          echo "HASH=$FINGERPRINT" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create Node.js WebTransport Server
        run: |
          cat << 'EOF' > server.js
          const quico = require('quico');
          const screenshot = require('screenshot-desktop');
          const fs = require('fs');

          const options = {
              key: fs.readFileSync('key.pem'),
              cert: fs.readFileSync('cert.pem')
          };

          const server = quico.createServer(options, (req, res) => {
              if (req.headers[':protocol'] === 'webtransport') {
                  res.writeHead(200);
                  console.log('WebTransport session active');

                  req.on('stream', (stream) => {
                      console.log('Streaming interface bound');

                      // Capture and stream loop handled completely within Node.js
                      const frameInterval = setInterval(async () => {
                          try {
                              const imgBuffer = await screenshot({ format: 'jpeg' });
                              if (stream.writable && !stream.destroyed) {
                                  stream.write(imgBuffer);
                              }
                          } catch (err) {
                              console.error('Capture error:', err.message);
                          }
                      }, 100);

                      stream.on('close', () => {
                          clearInterval(frameInterval);
                          console.log('Stream disconnected');
                      });
                  });
              } else {
                  fs.readFile('index.html', (err, data) => {
                      res.writeHead(200, { 'Content-Type': 'text/html' });
                      res.end(data);
                  });
              }
          });

          server.listen(4433, '0.0.0.0', () => {
              console.log('Server streaming on port 4433');
          });
          EOF
        shell: bash

      - name: Create Frontend Client
        run: |
          cat << 'EOF' > index.html
          <!DOCTYPE html>
          <html>
          <head>
              <title>WebTransport Stream (Pure JS)</title>
              <style>
                  body { margin: 0; overflow: hidden; background: #000; text-align: center; }
                  img { max-width: 100%; max-height: 100vh; display: block; margin: 0 auto; }
              </style>
          </head>
          <body>
              <img id="screen" src="" />
              <script>
                  const img = document.getElementById("screen");
                  
                  async function startTransport() {
                      const url = `https://${window.location.hostname}:4433`;
                      
                      const transport = new WebTransport(url, {
                          serverCertificateHashes: [
                              {
                                  algorithm: "sha-256",
                                  value: Uint8Array.from(atob("${{ steps.certs.outputs.HASH }}"), c => c.charCodeAt(0))
                              }
                          ]
                      });

                      await transport.ready;
                      const stream = await transport.createBidirectionalStream();
                      const reader = stream.readable.getReader();

                      while (true) {
                          const { value, done } = await reader.read();
                          if (done) break;
                          
                          const blob = new Blob([value], { type: 'image/jpeg' });
                          if (img.src) URL.revokeObjectURL(img.src);
                          img.src = URL.createObjectURL(blob);
                      }
                  }

                  startTransport().catch(console.error);
              </script>
          </body>
          </html>
          EOF
        shell: bash

      - name: Start Server & Display Info
        run: |
          PUBLIC_IP=$(curl -s https://ipify.org)
          echo "=================================================="
          echo "SERVER ADDR: https://$PUBLIC_IP:4433"
          echo "=================================================="
          node server.js
        shell: bash
