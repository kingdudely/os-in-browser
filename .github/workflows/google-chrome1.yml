name: Test Chrome Command

on: [push, pull_request]

jobs:
  check-chrome:
    name: Check Chrome on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    # Force bash to run on all platforms, including Windows
    defaults:
      run:
        shell: bash

    steps:
      - name: Test if chrome or google-chrome cmd is valid
        run: |
          CHROME_VALID=false
          GOOGLE_CHROME_VALID=false

          # Test the 'chrome' command
          if command -v chrome &> /dev/null; then
            echo "✅ 'chrome' is a valid command!"
            CHROME_VALID=true
          else
            echo "❌ 'chrome' is NOT a valid command."
          fi

          # Test the 'google-chrome' command
          if command -v google-chrome &> /dev/null; then
            echo "✅ 'google-chrome' is a valid command!"
            GOOGLE_CHROME_VALID=true
          else
            echo "❌ 'google-chrome' is NOT a valid command."
          fi

          # Fail the step if neither command works natively in bash
          if [ "$CHROME_VALID" = false ] && [ "$GOOGLE_CHROME_VALID" = false ]; then
            echo "Error: Neither command exists in the current system PATH."
            exit 1
          fi
