name: Remote Desktop

on: 
  workflow_dispatch:
    inputs:
      os:
        description: 'OS'
        type: choice
        required: true
        default: 'windows-latest'
        options:
          - windows-latest
          - ubuntu-latest
          - macos-latest

defaults:
  run:
    shell: bash

jobs:
  remote:
    runs-on: ${{ github.event.inputs.os }}
    timeout-minutes: 360
    env:
      PORT: 8080

    steps:
      - name: Copy repository into PC
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        id: setup-chrome

      - name: Install server dependencies
        run: |
          npm install

      - name: Create tunnel
        uses: anyvm-org/cf-tunnel@v0
        id: tunnel
        with:
          protocol: http
          port: ${{ env.PORT }}

      - name: Start server
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          NODE_OPTIONS: --unhandled-rejections=strict
          PUBLIC_URL: https://${{ steps.tunnel.outputs.server }}
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          npm start
