name: DO NOT RUN

on:
  workflow_dispatch:

permissions:
  actions: write 

defaults:
  run:
    shell: bash

jobs:
  run-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 1  # <-- Reduced to 1 minute
    
    strategy:
      matrix:
        job-id: [1]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: First Sleep
        run: |
          sleep infinity

      - name: Always Run Sleep
        if: always()        # <-- Forces execution after timeout
        run: |
          echo "First sleep timed out, entering second sleep..."
          sleep infinity

      - name: Always Run Sleep
        if: always()        # <-- Forces execution after timeout
        run: |
          echo "First sleep timed out, entering second sleep..."
          sleep infinity

