name: macos-novnc

on:
  workflow_dispatch:

jobs:
  mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # ----------------------------
      # Enable macOS Screen Sharing (real display)
      # ----------------------------
      - name: Enable Screen Sharing
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate -configure -access -on \
          -privs -all \
          -clientopts -setvnclegacy -vnclegacy yes \
          -restart -agent

      # ----------------------------
      # Install dependencies
      # ----------------------------
      - name: Install tools
        run: |
          brew update
          brew install cloudflared novnc websockify

      # ----------------------------
      # Start noVNC bridge (VNC -> WebSocket)
      # ----------------------------
      - name: Start noVNC server
        run: |
          echo "Starting websockify on port 6080..."

          websockify \
            --web=/opt/homebrew/share/novnc \
            6080 \
            127.0.0.1:5900 &

          sleep 2

          lsof -nP -iTCP:6080 -sTCP:LISTEN || true

      # ----------------------------
      # Start Cloudflare tunnel (WEB, not TCP)
      # ----------------------------
      - name: Start cloudflared tunnel
        run: |
          echo "Starting cloudflared tunnel to noVNC..."

          cloudflared tunnel --url http://127.0.0.1:6080
