name: macos-novnc-full

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Username for macOS login"
        required: true
        default: "vncuser"
      password:
        description: "Password for macOS login"
        required: true

jobs:
  mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Step 1: Force macOS to spin up a virtual display frame buffer
      - name: Initialize Virtual Display
        run: |
          echo "Configuring headless window management..."
          # Tell the window server to initialize a default fallback workspace
          sudo defaults write /Library/Preferences/com.apple.windowserver.plist DisplayResolutionEnabled -bool true
          sudo defaults write /Library/Preferences/com.apple.windowserver.plist DisplayAnyUserOnConsole -bool true

      # Step 2: Configure user accounts cleanly
      - name: Configure macOS User Account
        run: |
          TARGET_USER="${{ github.event.inputs.username }}"
          PASS="${{ github.event.inputs.password }}"
          
          if [ "$TARGET_USER" = "runner" ]; then
            echo "Target user is 'runner'. Adjusting password..."
            sudo sysadminctl -deletePassword runner || true
            sudo sysadminctl -resetPasswordFor runner -newPassword "$PASS"
          else
            if dscl . -read /Users/$TARGET_USER >/dev/null 2>&1; then
              echo "Conflict detected: User '$TARGET_USER' already exists. Purging..."
              sudo dseditgroup -o edit -d "$TARGET_USER" -t user admin || true
              sudo dscl . -delete /Users/$TARGET_USER
              sudo rm -rf "/Users/$TARGET_USER"
            fi
            
            echo "Creating fresh account: $TARGET_USER"
            LAST_ID=$(dscl . -list /Users UniqueID | awk '{print $2}' | sort -n | tail -n 1)
            NEW_ID=$((LAST_ID + 1))
            
            sudo dscl . -create /Users/$TARGET_USER
            sudo dscl . -create /Users/$TARGET_USER UserShell /bin/bash
            sudo dscl . -create /Users/$TARGET_USER RealName "$TARGET_USER"
            sudo dscl . -create /Users/$TARGET_USER UniqueID $NEW_ID
            sudo dscl . -create /Users/$TARGET_USER PrimaryGroupID 20
            sudo dscl . -create /Users/$TARGET_USER NFSHomeDirectory /Users/$TARGET_USER
            sudo dscl . -passwd /Users/$TARGET_USER "$PASS"
            sudo dscl . -append /Groups/admin GroupMembership $TARGET_USER
            
            sudo mkdir -p /Users/$TARGET_USER
            sudo chown -R $TARGET_USER:staff /Users/$TARGET_USER
          fi

      # Step 3: Enable modern Screen Sharing
      - name: Enable macOS Screen Sharing
        run: |
          USER="${{ github.event.inputs.username }}"
          
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -allowAccessFor -specifiedUsers \
            -restart -agent
            
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure \
            -users $USER \
            -privs -all

      # Step 4: Install cloudflared
      - name: Install cloudflared
        run: |
          brew install cloudflared

      # Step 5: Install noVNC & Websockify
      - name: Install noVNC
        run: |
          git clone https://github.com/novnc/noVNC.git
          git clone https://github.com/novnc/websockify.git noVNC/utils/websockify

      # Step 6: Start noVNC bridge in background
      - name: Start noVNC server
        run: |
          cd noVNC
          ./utils/novnc_proxy \
            --vnc 127.0.0.1:5900 \
            --listen 0.0.0.0:6080 &
          sleep 5
          echo "noVNC listening on 6080"

      # Step 7: Start cloudflared tunnel in background and loop indefinitely
      - name: Start cloudflared tunnel
        run: |
          echo "Starting Cloudflare Tunnel..."
          # Run tunnel in background and save its process ID (PID)
          cloudflared tunnel --url http://127.0.0.1:6080 &
          TUNNEL_PID=$!
          
          # Give the tunnel some time to secure its dynamic routing URL
          sleep 10
          
          echo "Tunnel running (PID: $TUNNEL_PID). Keeping workflow alive..."
          # Infinite loop ensuring the job stays active for up to 6 hours
          while kill -0 $TUNNEL_PID 2>/dev/null; do
            sleep 30
          done
