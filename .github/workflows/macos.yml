name: macos-novnc-full

on:
  workflow_dispatch:

jobs:
  mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # Enable macOS Screen Sharing (REAL DISPLAY)
      # ----------------------------
      - name: Enable macOS Screen Sharing
        run: |
          echo "Enabling Screen Sharing..."

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -privs -all \
            -clientopts -setvnclegacy -vnclegacy yes \
            -restart -agent

      # ----------------------------
      # Install dependencies
      # ----------------------------
      - name: Install cloudflared
        run: |
          brew update
          brew install cloudflared

      # ----------------------------
      # Install noVNC (correct way - NOT brew)
      # ----------------------------
      - name: Install noVNC
        run: |
          git clone https://github.com/novnc/noVNC.git
          git clone https://github.com/novnc/websockify.git noVNC/utils/websockify

      # ----------------------------
      # Start VNC -> Web bridge (noVNC)
      # ----------------------------
      - name: Start noVNC server
        run: |
          cd noVNC

          echo "Starting noVNC on port 6080..."

          ./utils/novnc_proxy \
            --vnc 127.0.0.1:5900 \
            --listen 0.0.0.0:6080 &

          sleep 3

          lsof -nP -iTCP:6080 -sTCP:LISTEN || true

      # ----------------------------
      # Start Cloudflare tunnel (HTTP ONLY)
      # ----------------------------
      - name: Start cloudflared tunnel
        run: |
          echo "Starting cloudflared tunnel..."

          cloudflared tunnel --url http://127.0.0.1:6080
