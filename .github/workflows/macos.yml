name: mac-gui

on:
  workflow_dispatch:
    inputs:
      vnc_password:
        description: "VNC password"
        required: true

jobs:
  mac-vnc:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # ----------------------------
      # Install dependencies
      # ----------------------------
      - name: Install cloudflared + VNC server
        run: |
          brew update
          brew install cloudflared tigervnc

      # ----------------------------
      # Setup VNC password
      # ----------------------------
      - name: Configure VNC password
        run: |
          mkdir -p ~/.vnc
          echo "${{ inputs.vnc_password }}" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

      # ----------------------------
      # Start VNC server
      # ----------------------------
      - name: Start VNC server
        run: |
          echo "Starting VNC server on :1 (port 5901)..."
          vncserver :1 -geometry 1440x900 -depth 24 -localhost no

          echo "Checking listener..."
          lsof -nP -iTCP:5901 -sTCP:LISTEN || true

      # ----------------------------
      # Start Cloudflare Tunnel
      # ----------------------------
      - name: Start cloudflared tunnel
        run: |
          echo "Starting tunnel to VNC..."
          cloudflared tunnel --url tcp://127.0.0.1:5901
