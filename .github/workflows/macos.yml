name: macos-novnc

on:
  workflow_dispatch:

jobs:
  mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # -------------------------
      # Enable macOS Screen Sharing (REAL DESKTOP)
      # -------------------------
      - name: Enable Screen Sharing (no password)
        run: |
          echo "Enabling macOS Screen Sharing..."

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate -configure -access -on \
          -privs -all \
          -clientopts -setvnclegacy -vnclegacy yes \
          -restart -agent

      # -------------------------
      # Install cloudflared + noVNC tools
      # -------------------------
      - name: Install cloudflared
        run: |
          brew update
          brew install cloudflared

      # -------------------------
      # Start cloudflared tunnel to macOS VNC (5900)
      # -------------------------
      - name: Start cloudflared tunnel
        run: |
          echo "Starting tunnel to macOS Screen Sharing on port 5900..."
          cloudflared tunnel --url tcp://127.0.0.1:5900
