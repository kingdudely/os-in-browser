name: macos-novnc-full

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Username for macOS login"
        required: true
        default: "vncuser"
      password:
        description: "Password for macOS login"
        required: true

jobs:
  mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Step 1: Create the custom macOS user account requested by the workflow inputs
      - name: Create macOS User Account
        run: |
          USER="${{ github.event.inputs.username }}"
          PASS="${{ github.event.inputs.password }}"
          
          echo "Creating user account: $USER"
          
          # Find a safe, unique ID for the new user
          LAST_ID=$(dscl . -list /Users UniqueID | awk '{print $2}' | sort -n | tail -n 1)
          NEW_ID=$((LAST_ID + 1))
          
          # Provision the account details
          sudo dscl . -create /Users/$USER
          sudo dscl . -create /Users/$USER UserShell /bin/bash
          sudo dscl . -create /Users/$USER RealName "$USER"
          sudo dscl . -create /Users/$USER UniqueID $NEW_ID
          sudo dscl . -create /Users/$USER PrimaryGroupID 20
          sudo dscl . -create /Users/$USER NFSHomeDirectory /Users/$USER
          
          # Set the user's password safely
          sudo dscl . -passwd /Users/$USER "$PASS"
          
          # Add user to the admin group so they can control the system
          sudo dscl . -append /Groups/admin GroupMembership $USER
          
          # Build the home directory structure so the macOS GUI loads properly
          sudo mkdir -p /Users/$USER
          sudo chown -R $USER:staff /Users/$USER

      # Step 2: Enable modern Screen Sharing for the newly created user
      - name: Enable macOS Screen Sharing
        run: |
          USER="${{ github.event.inputs.username }}"
          
          # Turn on the Screen Sharing/Remote Management service
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -allowAccessFor -specifiedUsers \
            -restart -agent
            
          # Explicitly bind remote control permissions to our custom user
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure \
            -users $USER \
            -privs -all

      # Step 3: Install cloudflared
      - name: Install cloudflared
        run: |
          brew update
          brew install cloudflared

      # Step 4: Install noVNC & Websockify
      - name: Install noVNC
        run: |
          git clone https://github.com/novnc/noVNC.git
          git clone https://github.com/novnc/websockify.git noVNC/utils/websockify

      # Step 5: Start noVNC bridge
      - name: Start noVNC server
        run: |
          cd noVNC
          ./utils/novnc_proxy \
            --vnc 127.0.0.1:5900 \
            --listen 0.0.0.0:6080 &
          sleep 5
          echo "noVNC listening on 6080"

      # Step 6: Start cloudflared tunnel
      - name: Start cloudflared tunnel
        run: |
          cloudflared tunnel --url http://127.0.0.1:6080
