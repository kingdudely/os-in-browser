name: macos-novnc-full

on:
  workflow_dispatch:
    inputs:
      password:
        description: "Password"
        required: true

jobs:
  mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enable macOS Screen Sharing
      - name: Enable macOS Screen Sharing
        run: |
          echo "Enabling Screen Sharing..."
      
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -privs -all \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "admin" \
            -restart -agent

      # Install cloudflared
      - name: Install cloudflared
        run: |
          brew update
          brew install cloudflared

      # Install noVNC
      - name: Install noVNC
        run: |
          git clone https://github.com/novnc/noVNC.git
          git clone https://github.com/novnc/websockify.git noVNC/utils/websockify

      # Start noVNC bridge
      - name: Start noVNC server
        run: |
          cd noVNC

          ./utils/novnc_proxy \
            --vnc 127.0.0.1:5900 \
            --listen 0.0.0.0:6080 &

          sleep 5

          echo "noVNC listening on 6080"

      # Start cloudflared tunnel
      - name: Start cloudflared tunnel
        run: |
          cloudflared tunnel --url http://127.0.0.1:6080
