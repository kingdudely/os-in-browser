name: Remote Desktop

on: 
  workflow_dispatch:
    inputs:
      os:
        description: 'OS'
        type: choice
        required: true
        default: 'windows-latest'
        options:
          - windows-latest
          - ubuntu-latest
          - macos-latest

defaults:
  run:
    shell: bash

jobs:
  remote:
    runs-on: ${{ github.event.inputs.os }}
    timeout-minutes: 360

    steps:
      - name: Copy repository into PC
        uses: actions/checkout@main

      - uses: actions/setup-python@main
        with:
          python-version: '3.14'

      - name: Install server dependencies
        run: |
          pip install av aiortc aiohttp pycloudflared

      - name: Start server
        run: |
          python3 main.py
