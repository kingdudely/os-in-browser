name: Remote Desktop

on: 
  workflow_dispatch:
    inputs:
      os:
        description: 'OS'
        type: choice
        required: true
        default: 'windows-latest'
        options:
          - windows-latest
          - ubuntu-latest
          - macos-latest

defaults:
  run:
    shell: bash

env:
  DISPLAY: ":0"
  PORT: "8080"

jobs:
  remote:
    runs-on: ${{ github.event.inputs.os }}
    timeout-minutes: 360

    steps:
      - name: Copy repository into PC
        uses: actions/checkout@main

      - name: Install Python
        uses: actions/setup-python@main
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Setup Ubuntu desktop GUI
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xorg xfce4 xvfb

          Xvfb ${DISPLAY} -screen 0 1920x1080x24 &
          setsid startxfce4 &

      - name: Install server dependencies
        run: |
          pip install -r requirements.txt

      - name: Start server
        run: |
          nohup python3 main.py &

      - name: Establish tunnel
        id: tunnel
        uses: anyvm-org/cf-tunnel@v0
        with:
          protocol: http
          port: ${{ env.PORT }}

      - name: "Tunnel URL"
        run: |
          echo "https://${{ steps.tunnel.outputs.server }}"
          sleep 21600
