name: Remote Desktop

on: 
  workflow_dispatch:
    inputs:
      os:
        description: 'OS'
        type: choice
        required: true
        default: 'windows-latest'
        options:
          - windows-latest
          - ubuntu-latest
          - macos-latest

defaults:
  run:
    shell: bash

jobs:
  remote:
    runs-on: ${{ github.event.inputs.os }}
    timeout-minutes: 360

    steps:
      - name: Copy repository into PC
        uses: actions/checkout@main

      - name: Install Python
        uses: actions/setup-python@main
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Setup Ubuntu desktop GUI
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ubuntu-desktop-minimal xvfb
          sudo reboot
          Xvfb :0 -screen 0 1920x1080x24 &
          DISPLAY=:0 gnome-session &

      - name: Install server dependencies
        run: |
          pip install -r requirements.txt

      - name: Start server
        run: |
          python3 -u main.py
