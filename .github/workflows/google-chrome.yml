name: Test Universal Chrome Command

on: [push, pull_request]

jobs:
  check-chrome:
    name: Check Chrome on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Setup Google Chrome
        uses: browser-actions/setup-chrome@v2

      # This identical command will now work on all 3 Operating Systems
      - name: Check Chrome Version
        run: chrome --version
