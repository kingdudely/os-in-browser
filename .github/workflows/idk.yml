name: Chrome Remote Desktop (Production Style)

on:
  workflow_dispatch:
    inputs:
      os:
        description: "windows | ubuntu | macos"
        required: true
        default: ubuntu

      crd_code:
        description: 'Paste CRD code ("4/0A...") from https://g.co/crd/headless'
        required: true

      crd_pin:
        description: "6+ digit PIN"
        required: true

jobs:
  crd:
    runs-on: ${{ inputs.os }}-latest
    timeout-minutes: 360

    steps:
      - name: Connect to Chrome Remote Desktop
        shell: bash
        run: |
          OS="${{ inputs.os }}"
          echo "Installing CRD on $OS"

          case "$OS" in
            ubuntu)
              sudo apt-get update -y
              sudo apt-get install -y wget
              wget https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
              sudo dpkg -i chrome-remote-desktop_current_amd64.deb || sudo apt-get -f install -y

              CRD_PATH="/opt/google/chrome-remote-desktop/start-host"
              ;;

            macos)
              brew install --cask chrome-remote-desktop-host # https://dl.google.com/dl/chrome-remote-desktop/chromeremotedesktop.dmg or https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktop.dmg

              CRD_PATH="/Library/Google/Chrome Remote Desktop/CurrentVersion/Host/Chrome Remote Desktop Host.app/Contents/MacOS/Chrome Remote Desktop Host"
              ;;

            windows)
              choco install chrome-remote-desktop-host -y --no-progress # https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi

              CRD_PATH="/c/Program Files (x86)/Google/Chrome Remote Desktop/CurrentVersion/remoting_start_host.exe"
              ;;

            *)
              echo "Unsupported OS: $OS"
              exit 1
              ;;
          esac

          $CRD_PATH --code="${{ inputs.crd_code }}" --pin="${{ inputs.crd_pin }}" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name="$(hostname)"

      - name: Keep session alive
        shell: bash
        run: |
          echo "CRD session running..."
          sleep 21600
