name: Roblox Studio Remote Session

on:
  workflow_dispatch:
    inputs:
      crd_code:
        description: "Chrome Remote Desktop auth command (from remotedesktop.google.com/headless)"
        required: true

jobs:
  session:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Install Roblox Studio
        shell: powershell
        run: |
          $url = "https://setup.rbxcdn.com/RobloxStudioLauncherBeta.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\RobloxStudio.exe"
          Start-Process "$env:TEMP\RobloxStudio.exe" -ArgumentList "-quiet" -Wait

      - name: Install Chrome Remote Desktop
        shell: powershell
        run: |
          $url = "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\crd.msi"
          Start-Process msiexec.exe -ArgumentList "/i `"$env:TEMP\crd.msi`" /quiet /norestart" -Wait

      - name: Authorize Chrome Remote Desktop
        shell: powershell
        run: ${{ github.event.inputs.crd_code }}

      - name: Keep session alive for 6 hours
        shell: powershell
        run: |
          Write-Host "Connect at: https://remotedesktop.google.com/access"
          Start-Sleep -Seconds 21600
