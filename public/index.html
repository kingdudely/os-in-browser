<!DOCTYPE html>
<html>
<body style="margin:0;background:black;overflow:hidden;">
<video
  id="video"
  autoplay
  playsinline
  style="width:100vw;height:100vh;object-fit:contain;"
></video>
<script>
const video = document.getElementById('video')
const pc = new RTCPeerConnection({
  iceServers: [{ urls: ['stun:stun.cloudflare.com:3478', 'stun:stun.l.google.com:19302'] }]
})

let channel
pc.ondatachannel = (e) => { channel = e.channel }
pc.ontrack = (e) => { video.srcObject = e.streams[0] }

const ws = new WebSocket(`ws://${location.host}`)
ws.onopen = () => ws.send(JSON.stringify({ type: 'viewer' }))
ws.onmessage = async (ev) => {
  const msg = JSON.parse(ev.data)
  if (msg.type === 'offer') {
    await pc.setRemoteDescription(msg)
    const answer = await pc.createAnswer()
    await pc.setLocalDescription(answer)
    ws.send(JSON.stringify({ type: 'answer', ...answer }))
    ws.close()
    console.log('connected')
  }
}

video.addEventListener('click', (e) => {
  channel?.send(JSON.stringify({ type: 'mouse', x: e.clientX, y: e.clientY, click: true }))
})
window.addEventListener('keydown', (e) => {
  channel?.send(JSON.stringify({ type: 'key', key: e.key.toLowerCase() }))
})
</script>
</body>
</html>
