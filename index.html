<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Screen Share</title>
	<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}
html, body, #video {
	width: 100dvw;
	height: 100dvh;
}
body {
	overflow: hidden;
}
#video {
	object-fit: contain;
}
	</style>
</head>
<body>
	<video id="video" autoplay playsinline muted></video>
	<script type="module">
const video = document.getElementById("video");
const peer = await connectToServerPeer();
peer.addEventListener("track", (event) => {
	video.srcObject = event.streams[0];
});

async function connectToServerPeer() {
	const peer = new RTCPeerConnection({
		iceServers: [{
				urls: "stun:stun.l.google.com:19302"
			},
			{
				urls: "stun:stun.cloudflare.com:3478"
			}
		]
	});

	peer.addTransceiver("audio", {
		direction: "recvonly"
	});
	peer.addTransceiver("video", {
		direction: "recvonly"
	});

	let isNegotiating = false;
	peer.addEventListener("negotiationneeded", async () => {
		if (isNegotiating) return;

		try {
			isNegotiating = true;

			await peer.setLocalDescription();
			await waitForIceGathering(peer);

			const response = await fetch("/whip", {
				method: "POST",
				headers: {
					"Content-Type": "application/sdp"
				},
				body: peer.localDescription.sdp
			});

			if (!response.ok) {
				throw new Error(`WHIP server responded with status ${response.status}`);
			}

			const answerSdp = await response.text();
			await peer.setRemoteDescription({
				type: "answer",
				sdp: answerSdp
			});

			console.log("WebRTC negotiation successful.");
		} catch (err) {
			console.error("Negotiation failed:", err);
		} finally {
			isNegotiating = false;
		}
	});

	peer.addEventListener("iceconnectionstatechange", () => {
		console.log(`ICE connection state: ${peer.iceConnectionState}`);
		if (peer.iceConnectionState === "failed") {
			peer.restartIce();
		}
	});

	return peer;
}

function waitForIceGathering(peer) {
	if (peer.iceGatheringState === "complete") {
		return true;
	} else {
		return new Promise((resolve) => {
			peer.addEventListener("icegatheringstatechange", function onStateChange() {
				if (peer.iceGatheringState === "complete") {
					peer.removeEventListener("icegatheringstatechange", onStateChange);
					resolve(true);
				}
			});
		});
	}
}
	</script>
</body>
</html>
