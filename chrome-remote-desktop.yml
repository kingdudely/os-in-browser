name: Chrome Remote Desktop Session

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Operating system"
        required: true
        default: "ubuntu-latest"
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-22.04
          - ubuntu-20.04
          - windows-latest
          - windows-2022
          - windows-2019
          - macos-latest
          - macos-14
          - macos-13
      duration_minutes:
        description: "How long to keep the session open (minutes)"
        required: false
        default: "30"

jobs:
  crd-linux:
    if: startsWith(inputs.os, 'ubuntu')
    runs-on: ${{ inputs.os }}
    timeout-minutes: 60

    steps:
      - name: Install Chrome Remote Desktop
        run: |
          curl -fsSL https://dl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/google.gpg
          echo "deb [arch=amd64] https://dl.google.com/linux/chrome-remote-desktop/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/chrome-remote-desktop.list
          sudo apt-get update -qq
          sudo apt-get install -y chrome-remote-desktop

      - name: Authorize with Google account
        run: ${{ secrets.CRD_HEADLESS_CODE }}

      - name: Keep session alive
        run: |
          echo "Chrome Remote Desktop running on ${{ inputs.os }} for ${{ inputs.duration_minutes }} minutes"
          echo "Connect at: https://remotedesktop.google.com/access"
          sleep $(( ${{ inputs.duration_minutes }} * 60 ))

  crd-windows:
    if: startsWith(inputs.os, 'windows')
    runs-on: ${{ inputs.os }}
    timeout-minutes: 60

    steps:
      - name: Install Chrome Remote Desktop
        shell: powershell
        run: |
          $installerUrl = "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi"
          $installerPath = "$env:TEMP\crd.msi"
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i `"$installerPath`" /quiet /norestart" -Wait

      - name: Authorize with Google account
        shell: powershell
        run: ${{ secrets.CRD_HEADLESS_CODE }}

      - name: Keep session alive
        shell: powershell
        run: |
          Write-Host "Chrome Remote Desktop running on ${{ inputs.os }} for ${{ inputs.duration_minutes }} minutes"
          Write-Host "Connect at: https://remotedesktop.google.com/access"
          Start-Sleep -Seconds (${{ inputs.duration_minutes }} * 60)

  crd-macos:
    if: startsWith(inputs.os, 'macos')
    runs-on: ${{ inputs.os }}
    timeout-minutes: 60

    steps:
      - name: Install Chrome Remote Desktop
        run: |
          curl -fsSL "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktop.dmg" \
            -o /tmp/crd.dmg
          sudo hdiutil attach /tmp/crd.dmg -nobrowse -quiet
          sudo installer -pkg "/Volumes/Chrome Remote Desktop/Install Chrome Remote Desktop.pkg" -target /
          sudo hdiutil detach "/Volumes/Chrome Remote Desktop" -quiet

      - name: Authorize with Google account
        run: ${{ secrets.CRD_HEADLESS_CODE }}

      - name: Keep session alive
        run: |
          echo "Chrome Remote Desktop running on ${{ inputs.os }} for ${{ inputs.duration_minutes }} minutes"
          echo "Connect at: https://remotedesktop.google.com/access"
          sleep $(( ${{ inputs.duration_minutes }} * 60 ))
