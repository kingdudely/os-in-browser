<!-- server/renderer.html -->
<!DOCTYPE html>
<html>
<body>
<script type="module">
  window.onerror = (msg, src, line, col, err) => {
  fetch('/log', { method: 'POST', body: JSON.stringify({ error: msg, line }) })
}
import { ipcRenderer, desktopCapturer } from 'electron'
const pc = new RTCPeerConnection({
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun.cloudflare.com:3478' }
  ]
})
let wsClosed = false
let ws

pc.ondatachannel = (e) => {
  e.channel.onmessage = (ev) => ipcRenderer.send('control', JSON.parse(ev.data))
}

pc.onicecandidate = (e) => {
  if (e.candidate && ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'candidate', candidate: e.candidate }))
  }
}

async function startCapture() {
  const sources = await desktopCapturer.getSources({ types: ['screen'] })
  const stream = await navigator.mediaDevices.getUserMedia({
    audio: false,
    video: {
      mandatory: {
        chromeMediaSource: 'desktop',
        chromeMediaSourceId: sources[0].id
      }
    }
  })
  stream.getTracks().forEach(t => pc.addTrack(t, stream))
}

await startCapture()

ws = new WebSocket('ws://localhost:8080')
ws.onopen = async () => {
  ws.send(JSON.stringify({ type: 'host' }))
  const offer = await pc.createOffer()
  await pc.setLocalDescription(offer)
  ws.send(JSON.stringify({ type: 'offer', ...offer }))
}
ws.onmessage = async (ev) => {
  const msg = JSON.parse(ev.data)
  if (msg.type === 'answer') await pc.setRemoteDescription(msg)
  if (msg.type === 'candidate') await pc.addIceCandidate(msg.candidate)
}
pc.onconnectionstatechange = () => {
  if (pc.connectionState === 'connected' && !wsClosed) {
    wsClosed = true
    ws.close()
  }
}
</script>
</body>
</html>
